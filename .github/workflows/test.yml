name: Test

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main

jobs:
  unit-tests:
    name: Swift Unit Tests
    runs-on: macos-26
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "26.6"

      - name: Run swift test
        run: swift test

  python-script-tests:
    name: Python Script Tests
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run update_appcast.py tests
        run: python3 .github/scripts/test_update_appcast.py -v

      - name: Run check_l10n.py tests
        run: python3 scripts/test_check_l10n.py -v

      - name: Check localization consistency
        run: python3 scripts/check_l10n.py
