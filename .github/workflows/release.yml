name: Build and Release

on:
  push:
    branches:
      - main
      - test-release
    paths:
      - 'CHANGELOG.md'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (test without actual release)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

# Only allow one release workflow to run at a time
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  PROJECT_NAME: Usage4Claude
  XCODE_PROJECT: Usage4Claude.xcodeproj
  BUILD_CONFIG: Release
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  SPARKLE_TOOLS_VERSION: "2.9.2"

jobs:
  # ============================================
  # Job 1: Validate Release
  # ============================================
  validate:
    name: Validate Release
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.version.outputs.version }}
      is_test: ${{ steps.check.outputs.is_test }}
      is_dry_run: ${{ steps.check.outputs.is_dry_run }}
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags
      
      - name: Check commit message for release trigger
        id: check
        run: |
          # Use heredoc to handle multi-line commit messages
          read -r -d '' COMMIT_MSG << 'EOF' || true
          ${{ github.event.head_commit.message }}
          EOF
          
          BRANCH="${{ github.ref_name }}"
          IS_DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          
          echo "Commit message: $COMMIT_MSG"
          echo "Branch: $BRANCH"
          echo "Dry run: $IS_DRY_RUN"
          
          # Check trigger type: manual (workflow_dispatch) or push with keyword
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "✅ Manual trigger detected"
            echo "should_release=true" >> $GITHUB_OUTPUT
          elif [[ "$COMMIT_MSG" =~ \[release\] ]] || [[ "$COMMIT_MSG" =~ \[RELEASE\] ]]; then
            echo "✅ Release keyword found in commit message"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "⏭️  No release trigger found, skipping"
            echo "should_release=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          # Check if test branch
          if [[ "$BRANCH" == "test-release" ]]; then
            echo "is_test=true" >> $GITHUB_OUTPUT
            echo "📝 Running in test mode (test-release branch)"
          else
            echo "is_test=false" >> $GITHUB_OUTPUT
          fi
          
          # Check if dry run
          if [[ "$IS_DRY_RUN" == "true" ]]; then
            echo "is_dry_run=true" >> $GITHUB_OUTPUT
            echo "🧪 Running in dry run mode"
          else
            echo "is_dry_run=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Extract version from CHANGELOG
        id: version
        if: steps.check.outputs.should_release == 'true'
        run: |
          VERSION=$(.github/scripts/verify_version.sh extract-changelog CHANGELOG.md)
          
          if [ -z "$VERSION" ]; then
            echo "❌ Failed to extract version from CHANGELOG.md"
            exit 1
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "✅ Detected version: $VERSION"
      
      - name: Check if version already released
        if: steps.check.outputs.should_release == 'true' && steps.check.outputs.is_test == 'false'
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          TAG="v$VERSION"
          
          # Check if tag already exists
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "❌ Tag $TAG already exists!"
            echo "This version has already been released."
            echo "Please update the version number in CHANGELOG.md"
            exit 1
          fi
          
          echo "✅ Version $VERSION is new"

      - name: Validate version is newer than published releases
        if: steps.check.outputs.should_release == 'true' && steps.check.outputs.is_test == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.version.outputs.version }}"

          echo "Checking if version $VERSION is greater than latest published release..."

          if ! .github/scripts/compare_versions.sh validate "$VERSION" "false"; then
            echo ""
            echo "❌ Version validation failed!"
            echo "The version number in CHANGELOG.md must be greater than the latest published release."
            echo ""
            echo "To fix this:"
            echo "1. Check latest release: https://github.com/${{ github.repository }}/releases"
            echo "2. Update version in CHANGELOG.md to a higher version number"
            echo "3. Update version in Xcode project to match"
            exit 1
          fi

          echo "✅ Version validation passed"

  # ============================================
  # Job 2: Build Application
  # ============================================
  build:
    name: Build Application
    needs: validate
    if: needs.validate.outputs.should_release == 'true'
    runs-on: macos-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      
      - name: Verify version consistency
        run: |
          echo "Verifying CHANGELOG version matches Xcode version..."
          if ! .github/scripts/verify_version.sh verify CHANGELOG.md ${{ env.XCODE_PROJECT }}; then
            echo ""
            echo "❌ Version mismatch detected!"
            echo "Please update the version in Xcode to match CHANGELOG.md"
            exit 1
          fi
      
      - name: Install dependencies
        run: |
          echo "Installing create-dmg..."
          brew install create-dmg

          echo "Downloading Sparkle CLI tools..."
          curl -fsSL "https://github.com/sparkle-project/Sparkle/releases/download/${{ env.SPARKLE_TOOLS_VERSION }}/Sparkle-${{ env.SPARKLE_TOOLS_VERSION }}.tar.xz" \
            -o /tmp/sparkle.tar.xz
          mkdir -p /tmp/sparkle-tools
          tar -xf /tmp/sparkle.tar.xz -C /tmp/sparkle-tools
          echo "✅ Sparkle CLI tools installed"
      
      - name: Import code signing certificate
        env:
          CODESIGN_CERT: ${{ secrets.CODESIGN_CERTIFICATE }}
          CODESIGN_PWD: ${{ secrets.CODESIGN_PASSWORD }}
          SPARKLE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          echo "$CODESIGN_CERT" | base64 --decode > certificate.p12
          security import certificate.p12 \
            -k "$KEYCHAIN_PATH" \
            -P "$CODESIGN_PWD" \
            -T /usr/bin/codesign \
            -T /usr/bin/security

          # Set keychain for codesign
          security list-keychains -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list \
            -S apple-tool:,apple: \
            -s \
            -k "$KEYCHAIN_PASSWORD" \
            "$KEYCHAIN_PATH"

          # Cleanup certificate file
          rm -f certificate.p12

          # Import Sparkle EdDSA private key into the same temporary keychain
          # sign_update will find it via the keychain search path set above
          # -A: allow any application to access without prompting (required in CI)
          # Note: add-generic-password takes the keychain as a positional arg, not -k
          security add-generic-password \
            -a "ed25519" \
            -s "https://sparkle-project.org" \
            -w "$SPARKLE_KEY" \
            -A \
            "$KEYCHAIN_PATH"

          echo "✅ Certificate and Sparkle EdDSA key imported"
      
      - name: Build application
        run: |
          echo "Building Usage4Claude..."
          ./scripts/build.sh --config ${{ env.BUILD_CONFIG }}
      
      - name: Generate SHA256 checksum
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          BUILD_DIR="build/${{ env.PROJECT_NAME }}-${{ env.BUILD_CONFIG }}-$VERSION"
          DMG_FILE="${{ env.PROJECT_NAME }}-v$VERSION.dmg"
          
          cd "$BUILD_DIR"
          
          if [ ! -f "$DMG_FILE" ]; then
            echo "❌ DMG file not found: $DMG_FILE"
            exit 1
          fi
          
          echo "Generating SHA256 checksum..."
          shasum -a 256 "$DMG_FILE" > "$DMG_FILE.sha256"
          
          echo "✅ Checksum generated"
          cat "$DMG_FILE.sha256"
      
      - name: Sign DMG with Sparkle
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          BUILD_DIR="build/${{ env.PROJECT_NAME }}-${{ env.BUILD_CONFIG }}-$VERSION"
          DMG_FILE="${{ env.PROJECT_NAME }}-v$VERSION.dmg"
          DMG_PATH="$BUILD_DIR/$DMG_FILE"
          SIGN_UPDATE="/tmp/sparkle-tools/bin/sign_update"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/$DMG_FILE"

          echo "Signing DMG with Sparkle EdDSA key..."
          SIGN_OUTPUT=$("$SIGN_UPDATE" "$DMG_PATH")

          if [ $? -ne 0 ]; then
            echo "❌ Sparkle signing failed: $SIGN_OUTPUT"
            exit 1
          fi

          # Save the enclosure element as a file for the release job to consume
          printf '          <enclosure\n              url="%s"\n              %s\n              type="application/octet-stream"/>\n' \
            "$DMG_URL" "$SIGN_OUTPUT" > "$BUILD_DIR/sparkle_enclosure.txt"

          echo "✅ Sparkle signature generated"
          cat "$BUILD_DIR/sparkle_enclosure.txt"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            build/${{ env.PROJECT_NAME }}-${{ env.BUILD_CONFIG }}-${{ needs.validate.outputs.version }}/${{ env.PROJECT_NAME }}-v${{ needs.validate.outputs.version }}.dmg
            build/${{ env.PROJECT_NAME }}-${{ env.BUILD_CONFIG }}-${{ needs.validate.outputs.version }}/${{ env.PROJECT_NAME }}-v${{ needs.validate.outputs.version }}.dmg.sha256
            build/${{ env.PROJECT_NAME }}-${{ env.BUILD_CONFIG }}-${{ needs.validate.outputs.version }}/sparkle_enclosure.txt
          retention-days: 7
      
      - name: Cleanup keychain
        if: always()
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          if [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH"
          fi

  # ============================================
  # Job 3: Create Release
  # ============================================
  release:
    name: Create Release
    needs: [validate, build]
    if: |
      needs.validate.outputs.should_release == 'true' &&
      needs.validate.outputs.is_test == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: ./artifacts

      - name: Generate release notes
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          .github/scripts/generate_release_notes.sh \
            .github/RELEASE_TEMPLATE.md \
            "$VERSION" \
            release_notes.md \
            CHANGELOG.md

          echo "✅ Release notes generated"

      - name: Create git tag
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          IS_DRY_RUN: ${{ needs.validate.outputs.is_dry_run }}
        run: |
          if [[ "$IS_DRY_RUN" == "true" ]]; then
            TAG="test-v$VERSION"
            echo "🧪 Creating test tag: $TAG"
          else
            TAG="v$VERSION"
            echo "Creating tag: $TAG"
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"
          
          echo "✅ Tag created: $TAG"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.validate.outputs.version }}
          IS_DRY_RUN: ${{ needs.validate.outputs.is_dry_run }}
          IS_TEST: ${{ needs.validate.outputs.is_test }}
          COMMIT_MSG: ${{ github.event.head_commit.message }}
        run: |
          # 标题取 commit message 第一行，去掉 [release]/[RELEASE] 前缀后 trim。
          # 用 env 传 COMMIT_MSG，避免直接插值导致的命令注入。
          RAW_TITLE=$(printf '%s\n' "$COMMIT_MSG" | head -n1)
          PARSED_TITLE=$(printf '%s' "$RAW_TITLE" \
            | sed -E 's/^\[[Rr][Ee][Ll][Ee][Aa][Ss][Ee]\][[:space:]]*//' \
            | sed -E 's/^[[:space:]]+//; s/[[:space:]]+$//')
          # 解析为空（如 workflow_dispatch 手动触发无 commit）时退回 vVERSION
          if [[ -z "$PARSED_TITLE" ]]; then
            PARSED_TITLE="v$VERSION"
          fi

          if [[ "$IS_DRY_RUN" == "true" ]]; then
            # Dry run 仍走 draft，避免测试产生正式发布
            TAG="test-v$VERSION"
            TITLE="test: $PARSED_TITLE - ⚠️ DRY RUN ⚠️"
            DRAFT_ARGS=(--draft)
          elif [[ "$IS_TEST" == "true" ]]; then
            # test-release 分支同样保持 draft，避免误触发正式发布
            TAG="v$VERSION"
            TITLE="$PARSED_TITLE"
            DRAFT_ARGS=(--draft)
          else
            TAG="v$VERSION"
            TITLE="$PARSED_TITLE"
            DRAFT_ARGS=()
          fi
          
          echo "Creating release: $TAG (title: $TITLE)"
          
          gh release create "$TAG" \
            "${DRAFT_ARGS[@]}" \
            --title "$TITLE" \
            --notes-file release_notes.md \
            ./artifacts/${{ env.PROJECT_NAME }}-v$VERSION.dmg \
            ./artifacts/${{ env.PROJECT_NAME }}-v$VERSION.dmg.sha256
          
          if [[ "$IS_DRY_RUN" == "true" ]]; then
            echo "✅ Draft (dry run) release created: $TAG"
          else
            echo "✅ Release published: $TAG"
            echo "📝 如需补充/精修 Release Notes，可到 GitHub 编辑该 release"
            echo "   （不影响 Sparkle 更新说明，后者取自 CHANGELOG）"
          fi
      
      - name: Update appcast.xml
        env:
          VERSION: ${{ needs.validate.outputs.version }}
          IS_DRY_RUN: ${{ needs.validate.outputs.is_dry_run }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IS_DRY_RUN="${{ needs.validate.outputs.is_dry_run }}"
          DMG_FILE="${{ env.PROJECT_NAME }}-v$VERSION.dmg"
          DMG_URL="https://github.com/${{ github.repository }}/releases/download/v$VERSION/$DMG_FILE"
          RELEASE_URL="https://github.com/${{ github.repository }}/releases/tag/v$VERSION"

          # CURRENT_PROJECT_VERSION is interpolated from MARKETING_VERSION at
          # build time, so the build number always equals the version string.
          BUILD_NUMBER="$VERSION"

          PUB_DATE=$(date -u "+%a, %d %b %Y %H:%M:%S +0000")

          python3 .github/scripts/update_appcast.py \
            appcast.xml \
            "$VERSION" \
            "$BUILD_NUMBER" \
            "$PUB_DATE" \
            "$DMG_URL" \
            "$RELEASE_URL" \
            CHANGELOG.md \
            ./artifacts/sparkle_enclosure.txt

          echo ""
          echo "📄 appcast.xml after update:"
          cat appcast.xml

          if [[ "$IS_DRY_RUN" == "true" ]]; then
            echo ""
            echo "🧪 Dry run: changes shown above, not pushing to main"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add appcast.xml
            git commit -m "chore: update appcast.xml for v$VERSION"
            git push origin main
            echo "✅ appcast.xml pushed to main"
          fi

      - name: Cleanup on failure
        if: failure()
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          IS_DRY_RUN="${{ needs.validate.outputs.is_dry_run }}"
          
          if [[ "$IS_DRY_RUN" == "true" ]]; then
            echo "🧪 Dry run mode - skipping cleanup"
            exit 0
          fi
          
          echo "⚠️  Build or release failed, cleaning up..."
          .github/scripts/cleanup_failed_release.sh "$VERSION" || true
          
          echo "✅ Cleanup completed"
